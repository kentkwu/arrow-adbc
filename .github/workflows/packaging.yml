name: Packaging

on:
  pull_request:
    branches:
      - main
    paths:
      - ".env"
      - "c/**"
      - "ci/**"
      - "dev/release/verify-apt.sh"
      - "dev/release/verify-yum.sh"
      - "glib/**"
      - "python/**"
      - "ruby/**"
      - ".github/workflows/packaging.yml"

  push:
    # Automatically build on RC tags
    branches-ignore:
      - "**"
    tags:
      - "apache-arrow-adbc-*-rc*"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: "Upload artifacts to Gemfury"
        required: true
        type: boolean
        default: false
concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  source:
    name: Source
    runs-on: ubuntu-latest
    if: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      # https://github.com/actions/checkout/issues/882
      - name: Update tags
        run: |
          git fetch --tags --force origin

      - name: Prepare version
        run: |
          source dev/release/versions.env
          echo "VERSION=${RELEASE}" | tee -a $GITHUB_ENV

      - name: Create archive
        run: |
          ci/scripts/source_build.sh \
            apache-arrow-adbc-${VERSION} \
            $(git log -n 1 --format=%h)

      - uses: actions/upload-artifact@v7
        with:
          name: source
          retention-days: 7
          path: |
            apache-arrow-adbc-*.tar.gz

  node-binaries:
    name: "Node.js ${{ matrix.settings.target }}"
    runs-on: ${{ matrix.settings.host }}
    needs:
      - source
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-15-intel
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Extract source archive
        run: |
          source_archive=$(echo apache-arrow-adbc-*.tar.gz)
          VERSION=${source_archive#apache-arrow-adbc-}
          VERSION=${VERSION%.tar.gz}

          tar xf apache-arrow-adbc-${VERSION}.tar.gz
          mv apache-arrow-adbc-${VERSION} adbc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: adbc/javascript/package-lock.json

      - name: Setup Rust
        run: |
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add ${{ matrix.settings.target }}

      - name: Install Node dependencies
        working-directory: adbc/javascript
        run: npm ci

      - name: Build Node.js binaries
        working-directory: adbc/javascript
        run: npx napi build --platform --release --target ${{ matrix.settings.target }}
        shell: bash

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        working-directory: adbc/javascript
        run: codesign --sign - *.node

      - name: Upload Node.js binaries
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: adbc/javascript/*.node
          if-no-files-found: error

  node-dist:
    name: "Node.js Package"
    runs-on: ubuntu-latest
    needs:
      - source
      - node-binaries
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Extract source archive
        run: |
          source_archive=$(echo apache-arrow-adbc-*.tar.gz)
          VERSION=${source_archive#apache-arrow-adbc-}
          VERSION=${VERSION%.tar.gz}

          tar xf apache-arrow-adbc-${VERSION}.tar.gz
          mv apache-arrow-adbc-${VERSION} adbc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: adbc/javascript/package-lock.json

      - name: Setup Rust
        run: |
          rustup toolchain install stable --no-self-update
          rustup default stable

      - name: Install Node dependencies
        working-directory: adbc/javascript
        run: npm ci

      - name: Build Node.js
        working-directory: adbc/javascript
        run: npm run build:ci && npm run build:ts

      - name: Download Node.js binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: adbc/javascript/artifacts
          merge-multiple: true

      - name: Package Node.js artifacts
        working-directory: adbc/javascript
        env:
          HUSKY: "0"
        run: |
          npx napi artifacts
          # Pack the main package
          npm pack
          # Pack the platform-specific packages
          for dir in npm/*; do
            npm pack "./$dir"
          done

      - name: Upload Node.js packages
        uses: actions/upload-artifact@v7
        with:
          name: node-packages
          retention-days: 7
          path: |
            adbc/javascript/*.tgz

  upload-gemfury:
    name: "Upload packages to Gemfury"
    runs-on: ubuntu-latest
    if: github.event.schedule || inputs.upload_artifacts
    needs:
      - node-dist
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: recursive
      - name: Get All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: nightly-artifacts
      - name: Upload
        run: |
          mkdir -p upload-staging
          find ./nightly-artifacts/ \
            -name 'apache-arrow-adbc-driver-manager-*.tgz' \
            -exec mv '{}' upload-staging \;

          # Node.js
          ./ci/scripts/node_npm_upload.sh upload-staging
        env:
          GEMFURY_PUSH_TOKEN: ${{ secrets.GEMFURY_PUSH_TOKEN }}
          NPM_REGISTRY: https://npm.fury.io/kentkwu/
          NPM_TOKEN: ${{ secrets.GEMFURY_PUSH_TOKEN }}
